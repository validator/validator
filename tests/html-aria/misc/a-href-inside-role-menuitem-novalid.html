<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anchor inside role=menuitem</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=menuitem allows only phrasing
     content with no interactive content descendants — so an
     <a href> as a descendant must be flagged. -->
<div role="menu" aria-label="File">
  <div role="menuitem">
    <a href="#">Open</a>
  </div>
</div>
</body>
</html>
