<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anchor inside role=option</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=option allows only phrasing content with no
     interactive content descendants — so an <a href> as a descendant
     must be flagged. -->
<div id="example-label-id">Lorem</div>
<div role="listbox" aria-labelledby="example-label-id">
  <div role="option">
    <a href="#">Ipsum</a>
  </div>
</div>
</body>
</html>
