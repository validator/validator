<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anchor inside role=menuitemcheckbox</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=menuitemcheckbox allows only phrasing
     content with no interactive content descendants — so an
     <a href> as a descendant must be flagged. -->
<div role="menu" aria-label="View">
  <div role="menuitemcheckbox" aria-checked="false">
    <a href="#">Sidebar</a>
  </div>
</div>
</body>
</html>
