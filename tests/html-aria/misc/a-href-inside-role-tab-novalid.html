<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anchor inside role=tab</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=tab allows only phrasing content with no
     interactive content descendants — so an <a href> as a descendant
     must be flagged. -->
<div role="tablist">
  <div role="tab" aria-selected="true" aria-controls="example-tabpanel-id">
    <a href="#">Editor 1</a>
  </div>
</div>
<div role="tabpanel" id="example-tabpanel-id"></div>
</body>
</html>
