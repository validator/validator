<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>role=toolbar inside heading</title>
</head>
<body>
<!-- Per HTML, the content model of h1, h2, h3, h4, h5, and h6 is
     phrasing content. Per ARIA in HTML, role=toolbar is flow
     content, not phrasing content — so an element with
     role=toolbar must not be a descendant of any heading. -->
<h1>
  <span role="toolbar">Lorem</span>
</h1>
</body>
</html>
