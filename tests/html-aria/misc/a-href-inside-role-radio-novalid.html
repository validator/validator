<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anchor inside role=radio</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=radio allows only phrasing
     content with no interactive content descendants — so an
     <a href> as a descendant must be flagged. -->
<div role="radiogroup" aria-label="Plan">
  <div role="radio" aria-checked="false">
    <a href="#">Details</a>
  </div>
</div>
</body>
</html>
