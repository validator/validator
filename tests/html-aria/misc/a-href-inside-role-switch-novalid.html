<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Anchor inside role=switch</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=switch allows only phrasing
     content with no interactive content descendants — so an
     <a href> as a descendant must be flagged. -->
<div role="switch" aria-checked="false" aria-label="Wireless">
  <a href="#">Help</a>
</div>
</body>
</html>
