<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tabindex on a descendant of role=tab</title>
</head>
<body>
<h1>Heading</h1>
<!-- Per ARIA in HTML, role=tab allows only phrasing content with no
     descendants that have a tabindex attribute. The tabindex on the
     inner span must be flagged. -->
<div role="tablist">
  <div role="tab" aria-selected="true" aria-controls="example-tabpanel-id">
    <span tabindex="0">Editor 1</span>
  </div>
</div>
<div role="tabpanel" id="example-tabpanel-id"></div>
</body>
</html>
