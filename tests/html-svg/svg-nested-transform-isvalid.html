<!DOCTYPE html>
<html lang="en">
<head>
 <title>transform on a nested svg element</title>
 <meta charset="utf-8">
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg">
  <title>Nested svg with a transform attribute</title>
  <svg x="10" transform="rotate(-10 50 100)">
    <rect x="10" y="10" height="100" width="100" style="stroke:#ff0000; fill:#0000ff"/>
  </svg>
</svg>
</body>
</html>
