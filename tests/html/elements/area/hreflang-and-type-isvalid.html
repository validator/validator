<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>area with hreflang and type</title>
</head>
<body>
<h1>Heading</h1>
<map name="m">
  <area shape="rect" coords="0,0,100,100"
        href="https://example.com/de.html"
        hreflang="de"
        type="text/html"
        alt="German version">
</map>
</body>
</html>
