<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tr with aria-rowindex, aria-colindex, aria-posinset, aria-setsize</title>
</head>
<body>
<table>
 <tr aria-rowindex="1" aria-colindex="1" aria-posinset="1" aria-setsize="2">
  <th>Lorem</th>
  <th>Ipsum</th>
 </tr>
 <tr aria-rowindex="2" aria-colindex="1" aria-posinset="2" aria-setsize="2">
  <td>Dolor</td>
  <td>Sit</td>
 </tr>
</table>
</body>
</html>
